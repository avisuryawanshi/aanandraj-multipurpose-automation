# ************ config-qa.properties ****************
# ==================================================================
# Environment-specific credentials (use encryption for prod)
# ==================================================================
appActivity=com.example.anandraj_multipuprose_hall.MainActivity
# ====================================================================
# Appium Server Configuration (for AppiumServerManager)
# ====================================================================
appium.server.host=127.0.0.1
appium.server.log.level=info
appium.server.port=4723
appium.server.timeout=120
appiumServer=http://127.0.0.1:4723/
appiumServerURL=http://127.0.0.1:4723/
# Options: local, cloud, parallel
# ====================================================================
# App Configuration
# Option 1: Launch pre-installed app
appPackage=com.example.anandraj_multipuprose_hall
# -----------------------------------------------------
# Option 2: Fresh install
appPath=D:\\AMH\\AnandRaj Multipurpose Hall Documents\\Builds\\app-release.apk
cloud.browserstack.app=bs://xxxxxxxxxxxxx
cloud.browserstack.debug=true
cloud.browserstack.key=${BROWSERSTACK_ACCESS_KEY}
cloud.browserstack.networkLogs=true
# BrowserStack
cloud.browserstack.url=https://hub-cloud.browserstack.com/wd/hub
cloud.browserstack.user=${BROWSERSTACK_USERNAME}
cloud.lambdatest.key=${LAMBDATEST_ACCESS_KEY}
# LambdaTest
cloud.lambdatest.url=https://hub.lambdatest.com/wd/hub
cloud.lambdatest.user=${LAMBDATEST_USERNAME}
# ===============================
# Cloud Platform Configuration # Appium Server URLs for Cloud Testing Platforms
# ===============================
# Active cloud platform (none, browserstack, sauce labs, lambda test)
cloud.platform.active=none
cloud.saucelabs.key=${SAUCELABS_ACCESS_KEY}
# SauceLabs
cloud.saucelabs.url=https://ondemand.saucelabs.com/wd/hub
cloud.saucelabs.user=${SAUCELABS_USERNAME}
device.browserstack.automationName=UiAutomator2
# Profile: BrowserStack Cloud
device.browserstack.name=Samsung Galaxy S23
device.browserstack.os=Android
device.browserstack.platformVersion=13
# Profile: Local Emulator
device.emulator.automationName=UiAutomator2
device.emulator.name=sdk_gphone64_x86_64 
device.emulator.platformName=Android
device.emulator.platformVersion=14
device.emulator.udid=emulator-5554
# Profile: iOS Simulator
device.ios.simulator.automationName=XCUITest
device.ios.simulator.name=iPhone 15 Pro
device.ios.simulator.platformVersion=17.0
device.ios.simulator.udid=xxxxxxxxxxxxx
device.real.automationName=UiAutomator2
# Profile: Real Device (Local)
#device.emulator.platformName=Android
device.real.name=Redmi Note 12 Pro+ 5G
device.real.platformVersion=14
device.real.udid=adb-cqrwkn89h6wocew8-pQXpCZ._adb-tls-connect._tcp
env.password.test=123456
env.user.test=qa_tester
# ====================================================================
# Environment Configuration: Local Appium Server URL
# ====================================================================
environment=qa
# Device list for parallel execution
parallel.devices=emulator-5554,emulator-5556,real-device-udid
# ====================================================================
# Test execution mode
test.mode=local
useApkInstall=true

